services:
  mariadb:
    build: .
    container_name: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qifrey
      MYSQL_DATABASE: qifrey_database
      MYSQL_USER: qifrey
      MYSQL_PASSWORD: qifrey
    restart: always

volumes:
  mariadb_data:

